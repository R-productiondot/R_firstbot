<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Life Climate</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="shop-page" class="page">
        <div class="header">
            <h1>Home Life Climate</h1>
            <input type="text" id="search" placeholder="Поиск товаров...">
        </div>
        <div id="results"></div>
        <div id="cart-info">В заказе: 0 товаров</div>
    </div>

    <div id="info-page" class="page" style="display: none; padding: 20px;">
        <div class="header"><h1>О компании</h1></div>
        <div class="info-card">
            <p><strong>Home Life Climate</strong> — ваш уют в наших руках.</p>
            <div onclick="openInstagram()" class="instagram-button">📸 Наш Instagram</div>
            <p>📍 г. Ташкент</p>
            <p>📞 +998 (90) 123-45-67</p>
        </div>
    </div>

    <div id="profile-page" class="page" style="display: none; padding: 20px;">
        <div class="header"><h1>Мои заказы</h1></div>
        <div id="order-history">
            <p style="text-align: center; opacity: 0.5; color: white; margin-top: 50px;">Заказов пока нет</p>
        </div>
    </div>

    <div class="nav-menu">
        <div class="nav-item active" onclick="showPage('shop', this)">
            <span>🛒</span><p>Магазин</p>
        </div>
        <div class="nav-item" onclick="showPage('info', this)">
            <span>ℹ️</span><p>О нас</p>
        </div>
        <div class="nav-item" onclick="showPage('profile', this)">
            <span>📦</span><p>Заказы</p>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
